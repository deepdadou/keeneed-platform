<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEENEED Admin Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #101418;
            color: #eef4f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(420px, calc(100vw - 32px));
            border: 1px solid #26323a;
            border-radius: 8px;
            padding: 28px;
            background: #151b21;
        }
        h1 { margin: 0 0 22px; font-size: 24px; font-weight: 650; }
        label { display: block; margin: 16px 0 8px; color: #aebbc4; font-size: 14px; }
        input {
            width: 100%;
            height: 44px;
            border: 1px solid #34424c;
            border-radius: 6px;
            padding: 0 12px;
            background: #0f1419;
            color: #eef4f8;
            font-size: 16px;
        }
        button {
            width: 100%;
            height: 44px;
            margin-top: 22px;
            border: 0;
            border-radius: 6px;
            background: #2f8f7b;
            color: white;
            font-size: 16px;
            font-weight: 650;
            cursor: pointer;
        }
        button:disabled { opacity: 0.65; cursor: wait; }
        .error { min-height: 20px; margin-top: 14px; color: #ff8f8f; font-size: 14px; }
    </style>
</head>
<body>
    <main>
        <h1>后台管理登录</h1>
        <form id="loginForm">
            <label for="username">用户名</label>
            <input id="username" name="username" autocomplete="username" required>
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button id="submitButton" type="submit">登录</button>
            <div id="error" class="error"></div>
        </form>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            var button = document.getElementById('submitButton');
            var error = document.getElementById('error');
            button.disabled = true;
            error.textContent = '';
            try {
                var response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                var result = await response.json();
                if (!response.ok || !result.success) {
                    throw new Error(result.error || '登录失败');
                }
                localStorage.setItem('admin_token', result.token);
                window.location.href = '/admin-stat.html';
            } catch (err) {
                error.textContent = err.message || '登录失败';
            } finally {
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
