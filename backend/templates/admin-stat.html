<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEENEED Admin Stats</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #f4f7f6;
            color: #172026;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: #14211f;
            color: white;
        }
        h1 { margin: 0; font-size: 22px; }
        nav a, nav button {
            margin-left: 14px;
            color: white;
            background: transparent;
            border: 0;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }
        main { padding: 24px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }
        .card {
            border: 1px solid #d9e1df;
            border-radius: 8px;
            padding: 18px;
            background: white;
        }
        .label { color: #65736f; font-size: 13px; }
        .value { margin-top: 8px; font-size: 28px; font-weight: 700; }
        section { margin-top: 24px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid #d9e1df;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td { padding: 10px 12px; border-bottom: 1px solid #edf1f0; text-align: left; }
        th { color: #52615d; font-size: 13px; }
        .error { color: #b42318; }
    </style>
</head>
<body>
    <header>
        <h1>后台统计</h1>
        <nav>
            <a href="/admin-api.html">API 管理</a>
            <button id="logoutButton">退出</button>
        </nav>
    </header>
    <main>
        <div id="status">加载中...</div>
        <div id="stats" class="grid"></div>
        <section>
            <h2>最近用户</h2>
            <table>
                <thead><tr><th>用户名</th><th>邮箱</th><th>余额</th><th>注册时间</th></tr></thead>
                <tbody id="recentUsers"></tbody>
            </table>
        </section>
    </main>
    <script>
        var token = localStorage.getItem('admin_token') || document.cookie.replace(/(?:(?:^|.*;\s*)admin_token\s*=\s*([^;]*).*$)|^.*$/, '$1');
        function authHeaders() { return { Authorization: 'Bearer ' + token }; }
        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function (char) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
            });
        }
        function metric(label, value) {
            return '<div class="card"><div class="label">' + escapeHtml(label) + '</div><div class="value">' + escapeHtml(value ?? 0) + '</div></div>';
        }
        async function loadStats() {
            if (!token) {
                window.location.href = '/admin-login.html';
                return;
            }
            var response = await fetch('/api/admin/stats', { headers: authHeaders() });
            if (response.status === 401) {
                window.location.href = '/admin-login.html';
                return;
            }
            var data = await response.json();
            document.getElementById('status').textContent = '';
            document.getElementById('stats').innerHTML = [
                metric('用户数', data.users),
                metric('帖子数', data.posts),
                metric('办公室数', data.offices),
                metric('今日访问', data.today_visits),
                metric('昨日访问', data.yesterday_visits),
                metric('当前在线', data.online_now),
                metric('总余额', data.total_balance)
            ].join('');
            document.getElementById('recentUsers').innerHTML = (data.recent_users || []).map(function (user) {
                return '<tr><td>' + escapeHtml(user.username) + '</td><td>' + escapeHtml(user.email) + '</td><td>' + escapeHtml(user.balance) + '</td><td>' + escapeHtml(user.created_at) + '</td></tr>';
            }).join('');
        }
        document.getElementById('logoutButton').addEventListener('click', async function () {
            await fetch('/api/admin/logout', { headers: authHeaders() });
            localStorage.removeItem('admin_token');
            window.location.href = '/admin-login.html';
        });
        loadStats().catch(function (err) {
            document.getElementById('status').innerHTML = '<span class="error">' + err.message + '</span>';
        });
    </script>
</body>
</html>
