<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEENEED Admin API</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #f4f7f6;
            color: #172026;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: #14211f;
            color: white;
        }
        h1 { margin: 0; font-size: 22px; }
        a { color: inherit; }
        main { padding: 24px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .card {
            border: 1px solid #d9e1df;
            border-radius: 8px;
            padding: 18px;
            background: white;
        }
        .label { color: #65736f; font-size: 13px; }
        .value { margin-top: 8px; font-size: 28px; font-weight: 700; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid #d9e1df;
        }
        th, td { padding: 10px 12px; border-bottom: 1px solid #edf1f0; text-align: left; }
        th { color: #52615d; font-size: 13px; }
        .error { color: #b42318; }
    </style>
</head>
<body>
    <header>
        <h1>API 管理</h1>
        <a href="/admin-stat.html">返回统计</a>
    </header>
    <main>
        <div id="status">加载中...</div>
        <div id="stats" class="grid"></div>
        <h2>API Key</h2>
        <table>
            <thead><tr><th>名称</th><th>用户</th><th>前缀</th><th>状态</th><th>调用次数</th><th>创建时间</th></tr></thead>
            <tbody id="keys"></tbody>
        </table>
    </main>
    <script>
        var token = localStorage.getItem('admin_token') || document.cookie.replace(/(?:(?:^|.*;\s*)admin_token\s*=\s*([^;]*).*$)|^.*$/, '$1');
        function authHeaders() { return { Authorization: 'Bearer ' + token }; }
        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function (char) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
            });
        }
        function metric(label, value) {
            return '<div class="card"><div class="label">' + escapeHtml(label) + '</div><div class="value">' + escapeHtml(value ?? 0) + '</div></div>';
        }
        async function getJson(url) {
            var response = await fetch(url, { headers: authHeaders() });
            if (response.status === 401) {
                window.location.href = '/admin-login.html';
                return null;
            }
            return response.json();
        }
        async function loadApi() {
            if (!token) {
                window.location.href = '/admin-login.html';
                return;
            }
            var apiStats = await getJson('/api/admin/stats/api');
            var keys = await getJson('/api/admin/keys');
            if (!apiStats || !keys) return;
            var data = apiStats.data || {};
            document.getElementById('status').textContent = '';
            document.getElementById('stats').innerHTML = [
                metric('总调用量', data.total_calls),
                metric('今日调用量', data.today_calls),
                metric('活跃 Agent', data.active_agents),
                metric('活跃 Key', data.active_keys)
            ].join('');
            document.getElementById('keys').innerHTML = ((keys.data && keys.data.keys) || []).map(function (key) {
                var status = key.revoked ? '已吊销' : (key.is_active ? '启用' : '停用');
                return '<tr><td>' + escapeHtml(key.name) + '</td><td>' + escapeHtml(key.username) + '</td><td>' + escapeHtml(key.api_key_prefix) + '</td><td>' + escapeHtml(status) + '</td><td>' + escapeHtml(key.call_count ?? 0) + '</td><td>' + escapeHtml(key.created_at) + '</td></tr>';
            }).join('');
        }
        loadApi().catch(function (err) {
            document.getElementById('status').innerHTML = '<span class="error">' + err.message + '</span>';
        });
    </script>
</body>
</html>
