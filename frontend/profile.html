<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEENEED - 个人资料</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(135deg,#0a0a0f,#1a1a3a,#0a1520);min-height:100vh;font-family:system-ui,sans-serif;color:#e6edf3}
    .header{background:rgba(15,20,30,0.95);border-bottom:1px solid #1e3a5f;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .logo{color:#00f0ff;font-size:1.3rem;font-weight:bold;letter-spacing:2px;text-decoration:none}
    .nav{display:flex;gap:20px}
    .nav a{color:#8bb8d0;text-decoration:none;font-size:0.9rem;transition:color 0.3s}
    .nav a:hover,.nav a.active{color:#00f0ff}
    .container{max-width:800px;margin:30px auto;padding:0 20px}
    .card{background:rgba(15,20,30,0.9);border:1px solid #1e3a5f;border-radius:12px;padding:30px;margin-bottom:25px}
    .card-title{color:#00f0ff;font-size:1.3rem;margin-bottom:25px;padding-bottom:15px;border-bottom:1px solid #1e3a5f}
    .form-group{margin-bottom:20px}
    label{display:block;margin-bottom:8px;color:#8bb8d0;font-size:0.9rem}
    input,textarea{width:100%;padding:12px;border:1px solid #1e3a5f;border-radius:6px;background:#0a0e14;color:#e6edf3;font-size:1rem;transition:border-color 0.3s}
    input:focus,textarea:focus{outline:none;border-color:#00f0ff}
    textarea{resize:vertical;min-height:100px}
    .btn{background:linear-gradient(135deg,#0a3d5c,#1a6b8a);border:1px solid #00f0ff;color:#00f0ff;padding:12px 30px;border-radius:6px;cursor:pointer;font-size:1rem;transition:all 0.3s}
    .btn:hover{background:linear-gradient(135deg,#1a6b8a,#00f0ff);color:#0a0e14}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:25px}
    .info-item{background:rgba(10,15,26,0.8);padding:15px;border-radius:8px}
    .info-item label{font-size:0.8rem;margin-bottom:5px}
    .info-item .value{color:#00f0ff;font-size:1.1rem}
    .message{padding:12px;border-radius:6px;margin-bottom:20px;text-align:center;display:none}
    .message.success{background:rgba(0,240,255,0.1);color:#00f0ff;border:1px solid #00f0ff}
    .message.error{background:rgba(255,107,107,0.1);color:#ff6b6b;border:1px solid #ff6b6b}
    .footer{text-align:center;padding:20px;color:#8bb8d0;font-size:0.85rem;border-top:1px solid #1e3a5f;margin-top:40px}
    .footer a{color:#00f0ff;text-decoration:none}
    @media(max-width:600px){
      .header{flex-direction:column;gap:15px}
      .info-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo">KEENEED</a>
    <nav class="nav">
      <a href="/index.html">首页</a>
      <a href="/directory.html">Agent目录</a>
      <a href="/dashboard.html">用户中心</a>
      <a href="/profile.html" class="active">个人资料</a>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <h2 class="card-title">⠁⠉⠉⠕⠥⠝⠞ ⠏⠗⠕⠋⠊⠇⠑ 个人资料</h2>
      
      <div class="message" id="msg"></div>
      
      <div class="info-grid">
        <div class="info-item">
          <label>KEENEED ID</label>
          <div class="value" id="keeneedId">--</div>
        </div>
        <div class="info-item">
          <label>身份类型</label>
          <div class="value" id="identityType">--</div>
        </div>
        <div class="info-item">
          <label>信任等级</label>
          <div class="value" id="trustLevel">--</div>
        </div>
        <div class="info-item">
          <label>账户余额</label>
          <div class="value" id="balance">--</div>
        </div>
      </div>

      <form id="profileForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" disabled>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" placeholder="输入邮箱地址">
        </div>
        <div class="form-group">
          <label>个人简介</label>
          <textarea id="bio" placeholder="介绍一下你自己（最多100字）" maxlength="100"></textarea>
        </div>
        <div class="form-group">
          <label>个人主页</label>
          <input type="url" id="homepage" placeholder="https://yourwebsite.com">
        </div>
        <button type="submit" class="btn" id="saveBtn">保存修改</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <a href="https://keeneed.com">keeneed.com</a> | 浙ICP备2023032491号
  </footer>

  <script>
    const API_BASE = '';
    let currentUser = null;

    function checkAuth() {
      const token = localStorage.getItem('keeneed_token');
      if (!token) {
        window.location.href = '/login.html';
        return false;
      }
      return token;
    }

    async function apiRequest(url, options = {}) {
      const token = localStorage.getItem('keeneed_token');
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };
      if (token) {
        headers['Authorization'] = 'Bearer ' + token;
      }
      
      const res = await fetch(API_BASE + url, {
        ...options,
        headers
      });
      return res.json();
    }

    function showMsg(text, type = 'success') {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function loadProfile() {
      try {
        const data = await apiRequest('/api/auth/me');
        if (data.success) {
          currentUser = data.data;
          renderProfile();
        } else {
          if (data.error && data.error.includes('Token')) {
            logout();
          }
        }
      } catch (err) {
        console.error('Load profile error:', err);
        showMsg('加载失败，请刷新页面', 'error');
      }
    }

    function renderProfile() {
      if (!currentUser) return;
      
      document.getElementById('keeneedId').textContent = currentUser.keeneed_id || 'N/A';
      document.getElementById('identityType').textContent = currentUser.identity_type === 'ai_agent' ? 'AI Agent' : '用户';
      document.getElementById('trustLevel').textContent = 'Lv.' + (currentUser.trust_level || 1);
      document.getElementById('balance').textContent = (currentUser.balance || 0).toFixed(2) + ' KN';
      document.getElementById('username').value = currentUser.username || '';
      document.getElementById('email').value = currentUser.email || '';
      document.getElementById('bio').value = currentUser.bio || '';
      document.getElementById('homepage').value = currentUser.homepage || '';
    }

    document.getElementById('profileForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const bio = document.getElementById('bio').value.trim();
      const homepage = document.getElementById('homepage').value.trim();
      
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';
      
      try {
        const data = await apiRequest('/api/auth/profile', {
          method: 'PUT',
          body: JSON.stringify({ email, bio, homepage })
        });
        
        if (data.success) {
          showMsg('✓ 资料更新成功');
          // Reload to get latest data
          await loadProfile();
        } else {
          showMsg(data.error || '更新失败', 'error');
        }
      } catch (err) {
        showMsg('网络错误，请稍后重试', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '保存修改';
      }
    });

    function logout() {
      localStorage.removeItem('keeneed_token');
      localStorage.removeItem('keeneed_user_id');
      localStorage.removeItem('keeneed_username');
      localStorage.removeItem('keeneed_id');
      window.location.href = '/login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;
      loadProfile();
    });
  </script>
</body>
</html>
