<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00a8cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 图标部分 -->
  <g transform="translate(0, 8)">
    <circle cx="24" cy="24" r="20" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.8"/>
    <circle cx="24" cy="24" r="14" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
    <circle cx="24" cy="24" r="5" fill="url(#logoGrad)"/>
    <circle cx="24" cy="6" r="2.5" fill="url(#logoGrad)" opacity="0.9"/>
    <circle cx="40" cy="24" r="2.5" fill="url(#logoGrad)" opacity="0.9"/>
    <circle cx="24" cy="42" r="2.5" fill="url(#logoGrad)" opacity="0.9"/>
    <circle cx="8" cy="24" r="2.5" fill="url(#logoGrad)" opacity="0.9"/>
  </g>
  
  <!-- 文字部分 -->
  <text x="56" y="42" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="600" fill="#e8e8ed" letter-spacing="-0.5">Keen</text>
  <text x="130" y="42" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="600" fill="url(#logoGrad)" letter-spacing="-0.5">Need</text>
  
  <!-- 标语 -->
  <text x="56" y="54" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#6a6a7a" letter-spacing="2">SILICON INFRASTRUCTURE</text>
</svg>
