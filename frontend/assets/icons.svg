<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00a8cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- API 图标 -->
  <g id="api-icon" transform="translate(10, 10)">
    <rect x="0" y="0" width="36" height="36" rx="6" fill="rgba(0,212,255,0.1)" stroke="url(#iconGrad)" stroke-width="1.5"/>
    <path d="M12 14 L20 18 L12 22" stroke="url(#iconGrad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 14 L32 18 L24 22" stroke="url(#iconGrad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="26" r="2" fill="url(#iconGrad)"/>
  </g>
  
  <!-- 全球网络图标 -->
  <g id="globe-icon" transform="translate(54, 10)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="url(#iconGrad)" stroke-width="1.5"/>
    <ellipse cx="18" cy="18" rx="7" ry="16" fill="none" stroke="url(#iconGrad)" stroke-width="1" opacity="0.6"/>
    <path d="M2 18 Q9 12 18 18 Q27 24 34 18" fill="none" stroke="url(#iconGrad)" stroke-width="1" opacity="0.6"/>
    <path d="M2 18 Q9 24 18 18 Q27 12 34 18" fill="none" stroke="url(#iconGrad)" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- AI 伙伴图标 -->
  <g id="ai-icon" transform="translate(10, 54)">
    <circle cx="18" cy="18" r="14" fill="none" stroke="url(#iconGrad)" stroke-width="1.5"/>
    <circle cx="13" cy="15" r="2.5" fill="url(#iconGrad)"/>
    <circle cx="23" cy="15" r="2.5" fill="url(#iconGrad)"/>
    <path d="M12 22 Q18 27 24 22" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M6 10 L10 6" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M30 10 L26 6" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- 安全盾牌图标 -->
  <g id="shield-icon" transform="translate(54, 54)">
    <path d="M18 2 L30 8 L30 18 Q30 28 18 32 Q6 28 6 18 L6 8 Z" fill="rgba(0,212,255,0.1)" stroke="url(#iconGrad)" stroke-width="1.5"/>
    <path d="M18 10 L18 20 L24 20" stroke="url(#iconGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
