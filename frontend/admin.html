<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <title>keeneed - Admin Panel</title>
    <meta http-equiv="refresh" content="60">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --primary: #00d4ff;
            --secondary: #00ff88;
            --bg-dark: #0a0a0f;
            --bg-card: #1a1a2f;
            --border: rgba(0, 212, 255, 0.2);
            --text: #e0e0e0;
            --text-dim: #888;
        }
        
        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }
        
        /* 盲文纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: -1;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #0d1525 0%, #1a1a2f 100%);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: var(--secondary);
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h1::before { content: '🔒'; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
        }
        
        .tab {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
        
        .tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .tab.active {
            background: var(--primary);
            color: var(--bg-dark);
            font-weight: bold;
        }
        
        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .card-title {
            color: var(--secondary);
            font-size: 14px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        .stat-number {
            font-size: 36px;
            color: var(--secondary);
            font-weight: bold;
        }
        
        .stat-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        
        .stat-card.disabled .stat-number { color: #ff6b6b; }
        .stat-card.revoked .stat-number { color: #ffd93d; }
        
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            color: var(--secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 255, 136, 0.05);
        }
        
        tr:hover td {
            background: rgba(0, 212, 255, 0.05);
        }
        
        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-badge.active {
            background: rgba(0, 255, 136, 0.2);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }
        
        .status-badge.disabled {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }
        
        .status-badge.revoked {
            background: rgba(255, 217, 61, 0.2);
            color: #ffd93d;
            border: 1px solid #ffd93d;
        }
        
        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
        }
        
        .btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-primary {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }
        
        .btn-primary:hover {
            background: var(--secondary);
            border-color: var(--secondary);
        }
        
        .btn-danger {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .btn-danger:hover {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-small {
            padding: 4px 10px;
            font-size: 11px;
        }
        
        /* Action Buttons Group */
        .action-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        /* Search & Filter */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .filter-select {
            padding: 10px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            color: var(--secondary);
            font-size: 18px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-close:hover { color: var(--primary); }
        
        /* Agent Info */
        .agent-info {
            display: grid;
            gap: 16px;
        }
        
        .info-row {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 4px;
        }
        
        .info-label {
            color: var(--text-dim);
            min-width: 120px;
        }
        
        .info-value {
            color: var(--text);
            word-break: break-all;
        }
        
        .api-key-display {
            font-family: monospace;
            background: rgba(0, 212, 255, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
            color: var(--primary);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        
        .pagination button {
            padding: 8px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            border-radius: 4px;
        }
        
        .pagination button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .pagination button.active {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }
        
        /* Section */
        .section { display: none; }
        .section.active { display: block; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            border-radius: 8px;
            display: none;
            z-index: 2000;
        }
        
        .toast.show { display: block; }
        .toast.error { border-color: #ff6b6b; color: #ff6b6b; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>keeneed Admin</h1>
            <div>
                <span style="color: var(--text-dim); margin-right: 16px;">Admin Panel</span>
                <span id="adminUser" style="color: var(--primary);"></span>
            </div>
        </div>
    </header>
    
    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="stats">📊 统计概览</button>
            <button class="tab" data-tab="agents">🤖 Agent 管理</button>
        </div>
        
        <!-- Stats Section -->
        <section id="statsSection" class="section active">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-number" id="statTotal">-</div>
                    <div class="stat-label">总注册数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statActive">-</div>
                    <div class="stat-label">活跃数</div>
                </div>
                <div class="stat-card disabled">
                    <div class="stat-number" id="statDisabled">-</div>
                    <div class="stat-label">禁用数</div>
                </div>
                <div class="stat-card revoked">
                    <div class="stat-number" id="statRevoked">-</div>
                    <div class="stat-label">已吊销</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">📈 访问统计</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalVisits">0</div>
                        <div class="stat-label">总访问量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="uniqueIPs">0</div>
                        <div class="stat-label">独立IP</div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Agents Section -->
        <section id="agentsSection" class="section">
            <div class="card">
                <div class="card-title">🤖 Agent 列表</div>
                
                <!-- Toolbar -->
                <div class="toolbar">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索名称、ID或归属人...">
                    <select class="filter-select" id="statusFilter">
                        <option value="">全部状态</option>
                        <option value="active">活跃</option>
                        <option value="disabled">禁用</option>
                        <option value="revoked">已吊销</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadAgents(1)">🔍 搜索</button>
                </div>
                
                <!-- Table -->
                <div id="agentsTable">
                    <table>
                        <thead>
                            <tr>
                                <th>KEENEED ID</th>
                                <th>名称</th>
                                <th>归属人</th>
                                <th>状态</th>
                                <th>注册时间</th>
                                <th>最后使用</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="agentsBody">
                            <tr><td colspan="7" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="pagination" id="pagination"></div>
            </div>
        </section>
    </div>
    
    <!-- Agent Detail Modal -->
    <div class="modal" id="agentModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🤖 Agent 详情</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="agent-info" id="agentInfo">
                <!-- Dynamic content -->
            </div>
            <div style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap;" id="agentActions">
                <!-- Dynamic buttons -->
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 部署前替换为实际 ADMIN_TOKEN（与后端 ADMIN_TOKEN 环境变量一致）
        const ADMIN_TOKEN = '__ADMIN_TOKEN_PLACEHOLDER__';
        let currentPage = 1;
        let currentAgent = null;
        
        // Toast notification
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.className = 'toast', 3000);
        }
        
        // API helper
        async function api(endpoint, options = {}) {
            try {
                const response = await fetch(endpoint, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': ADMIN_TOKEN,
                        ...options.headers
                    }
                });
                const data = await response.json();
                if (!response.ok && !data.success) {
                    throw new Error(data.error || 'Request failed');
                }
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }
        
        // Tab navigation
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Section').classList.add('active');
                
                if (tab.dataset.tab === 'stats') {
                    loadStats();
                } else if (tab.dataset.tab === 'agents') {
                    loadAgents(1);
                }
            });
        });
        
        // Load stats
        async function loadStats() {
            try {
                const data = await api('/api/admin/agents/stats');
                document.getElementById('statTotal').textContent = data.stats.total;
                document.getElementById('statActive').textContent = data.stats.active;
                document.getElementById('statDisabled').textContent = data.stats.disabled;
                document.getElementById('statRevoked').textContent = data.stats.revoked;
            } catch (e) {
                // Fallback to local data
                const v = JSON.parse(localStorage.getItem('keen_visits') || '[]');
                document.getElementById('totalVisits').textContent = v.length;
                document.getElementById('uniqueIPs').textContent = [...new Set(v.map(x => x.ip))].length;
            }
        }
        
        // Load agents list
        async function loadAgents(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            
            try {
                const data = await api(`/api/admin/agents?page=${page}&limit=20&search=${search}&status=${status}`);
                renderAgents(data);
            } catch (error) {
                document.getElementById('agentsBody').innerHTML = 
                    `<tr><td colspan="7" style="color: #ff6b6b; text-align: center;">加载失败: ${error.message}</td></tr>`;
            }
        }
        
        // Render agents table
        function renderAgents(data) {
            const tbody = document.getElementById('agentsBody');
            
            if (!data.agents || data.agents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-dim);">暂无数据</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            tbody.innerHTML = data.agents.map(agent => `
                <tr>
                    <td><code style="color: var(--primary);">${agent.keeneedId || '-'}</code></td>
                    <td>${agent.agentName || '-'}</td>
                    <td>${agent.ownerName || '-'}</td>
                    <td><span class="status-badge ${agent.status}">${getStatusText(agent.status)}</span></td>
                    <td>${formatDate(agent.createdAt)}</td>
                    <td>${agent.lastUsedAt ? formatDate(agent.lastUsedAt) : '-'}</td>
                    <td>
                        <div class="action-group">
                            <button class="btn btn-small" onclick="viewAgent('${agent.id}')">详情</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            
            // Pagination
            renderPagination(data.total, data.limit, data.offset);
        }
        
        // Pagination
        function renderPagination(total, limit, offset) {
            const totalPages = Math.ceil(total / limit);
            const currentPage = Math.floor(offset / limit) + 1;
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadAgents(${i})">${i}</button>`;
            }
            pagination.innerHTML = html;
        }
        
        // View agent detail
        async function viewAgent(id) {
            try {
                const data = await api(`/api/admin/agents/${id}`);
                currentAgent = data.agent;
                showAgentModal(data.agent);
            } catch (error) {
                showToast('加载详情失败: ' + error.message, true);
            }
        }
        
        // Show agent modal
        function showAgentModal(agent) {
            const info = document.getElementById('agentInfo');
            const actions = document.getElementById('agentActions');
            
            info.innerHTML = `
                <div class="info-row">
                    <span class="info-label">KEENEED ID</span>
                    <span class="info-value"><code style="color: var(--primary);">${agent.keeneedId || '-'}</code></span>
                </div>
                <div class="info-row">
                    <span class="info-label">名称</span>
                    <span class="info-value">${agent.agentName || '-'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">描述</span>
                    <span class="info-value">${agent.description || '-'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">能力</span>
                    <span class="info-value">${(agent.capabilities || []).join(', ') || '-'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">联系方式</span>
                    <span class="info-value">${agent.contact || '-'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">归属人</span>
                    <span class="info-value">${agent.ownerName || '-'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">API Key</span>
                    <span class="info-value api-key-display">${agent.apiKey || '已吊销'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">状态</span>
                    <span class="info-value"><span class="status-badge ${agent.status}">${getStatusText(agent.status)}</span></span>
                </div>
                <div class="info-row">
                    <span class="info-label">注册时间</span>
                    <span class="info-value">${formatDate(agent.createdAt)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">最后使用</span>
                    <span class="info-value">${agent.lastUsedAt ? formatDate(agent.lastUsedAt) : '-'}</span>
                </div>
            `;
            
            // Action buttons based on status
            let btns = '';
            if (agent.status === 'active') {
                btns += `<button class="btn btn-danger" onclick="disableAgent()">禁用</button>`;
                btns += `<button class="btn" onclick="revokeKey()">吊销Key</button>`;
                btns += `<button class="btn" onclick="regenerateKey()">重新发Key</button>`;
            } else if (agent.status === 'disabled') {
                btns += `<button class="btn btn-primary" onclick="enableAgent()">启用</button>`;
                btns += `<button class="btn" onclick="revokeKey()">吊销Key</button>`;
            } else if (agent.status === 'revoked') {
                btns += `<button class="btn btn-primary" onclick="regenerateKey()">重新发Key</button>`;
            }
            actions.innerHTML = btns;
            
            document.getElementById('agentModal').classList.add('show');
        }
        
        // Modal actions
        function closeModal() {
            document.getElementById('agentModal').classList.remove('show');
            currentAgent = null;
        }
        
        async function disableAgent() {
            if (!currentAgent) return;
            try {
                await api(`/api/admin/agents/${currentAgent.id}/disable`, { method: 'PUT' });
                showToast('Agent 已禁用');
                closeModal();
                loadAgents(currentPage);
            } catch (e) {
                showToast('操作失败: ' + e.message, true);
            }
        }
        
        async function enableAgent() {
            if (!currentAgent) return;
            try {
                await api(`/api/admin/agents/${currentAgent.id}/enable`, { method: 'PUT' });
                showToast('Agent 已启用');
                closeModal();
                loadAgents(currentPage);
            } catch (e) {
                showToast('操作失败: ' + e.message, true);
            }
        }
        
        async function revokeKey() {
            if (!currentAgent) return;
            if (!confirm('确定要吊销此 Agent 的 API Key 吗？')) return;
            try {
                await api(`/api/admin/agents/${currentAgent.id}/revoke-key`, { method: 'PUT' });
                showToast('API Key 已吊销');
                closeModal();
                loadAgents(currentPage);
            } catch (e) {
                showToast('操作失败: ' + e.message, true);
            }
        }
        
        async function regenerateKey() {
            if (!currentAgent) return;
            if (!confirm('确定要重新生成 API Key 吗？')) return;
            try {
                const data = await api(`/api/admin/agents/${currentAgent.id}/regenerate-key`, { method: 'PUT' });
                showToast('新 API Key: ' + data.apiKey);
                closeModal();
                loadAgents(currentPage);
            } catch (e) {
                showToast('操作失败: ' + e.message, true);
            }
        }
        
        // Utilities
        function getStatusText(status) {
            const map = { active: '活跃', disabled: '禁用', revoked: '已吊销' };
            return map[status] || status;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleString('zh-CN');
        }
        
        // Search on enter
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') loadAgents(1);
        });
        
        // Status filter change
        document.getElementById('statusFilter').addEventListener('change', () => loadAgents(1));
        
        // Initial load
        loadStats();
    </script>
</body>
</html>
