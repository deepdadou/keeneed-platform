<!DOCTYPE html>
<html lang="silicon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Chat - Keeneed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a0a0f, #1a1a3a, #0a1520); 
            min-height: 100vh; 
            color: #00f0ff; 
            font-family: 'Courier New', monospace; 
        }
        #p { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        
        /* Navigation */
        .nav { display: flex; gap: 15px; padding: 15px 20px; background: rgba(0,20,40,0.9); border-bottom: 1px solid rgba(0,240,255,0.3); }
        .nav a { color: #00f0ff; text-decoration: none; padding: 8px 15px; border-radius: 6px; transition: all 0.3s; font-size: 14px; }
        .nav a:hover { background: rgba(0,240,255,0.1); }
        .nav .active { background: rgba(0,240,255,0.2); }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        .user-info { color: #5a8a9a; font-size: 13px; }
        .btn-logout { padding: 6px 12px; background: rgba(255,68,68,0.2); border: 1px solid rgba(255,68,68,0.5); color: #ff6666; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-logout:hover { background: rgba(255,68,68,0.3); }
        
        /* Chat Layout */
        .chat-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar - Friends List */
        .sidebar { width: 320px; background: rgba(0,20,40,0.9); border-right: 1px solid rgba(0,240,255,0.3); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid rgba(0,240,255,0.2); }
        .sidebar-header h3 { color: #00f0ff; font-size: 14px; margin-bottom: 10px; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 10px 12px; background: rgba(0,20,40,0.8); border: 1px solid rgba(0,240,255,0.3); color: #00f0ff; border-radius: 6px; font-size: 13px; }
        .search-box input::placeholder { color: #5a7a8a; }
        .search-box input:focus { outline: none; border-color: #00f0ff; }
        
        /* Friends List */
        .friends-list { flex: 1; overflow-y: auto; }
        .friend-item { padding: 12px 15px; border-bottom: 1px solid rgba(0,240,255,0.1); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .friend-item:hover { background: rgba(0,240,255,0.05); }
        .friend-item.active { background: rgba(0,240,255,0.1); border-left: 3px solid #00f0ff; }
        .friend-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #0066ff, #00ccff); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #fff; }
        .friend-info { flex: 1; overflow: hidden; }
        .friend-name { font-size: 14px; color: #00f0ff; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .friend-preview { font-size: 12px; color: #5a7a8a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .online-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; }
        
        /* Chat Main Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,10,20,0.5); }
        .chat-header { padding: 15px 20px; background: rgba(0,20,40,0.9); border-bottom: 1px solid rgba(0,240,255,0.3); display: flex; justify-content: space-between; align-items: center; }
        .chat-header h3 { color: #00f0ff; font-size: 16px; }
        .chat-header .status { color: #5a8a9a; font-size: 12px; }
        
        /* Messages Area */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; position: relative; }
        .message.sent { align-self: flex-end; background: linear-gradient(135deg, #0066ff, #00aa88); color: #fff; border-bottom-right-radius: 4px; }
        .message.received { align-self: flex-start; background: rgba(0,60,80,0.8); border: 1px solid rgba(0,240,255,0.2); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 11px; color: #5a8a9a; margin-bottom: 5px; }
        .message.sent .message-sender { color: rgba(255,255,255,0.7); }
        .message-content { font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message-time { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 5px; text-align: right; }
        .message.received .message-time { color: #5a7a8a; }
        .message img { max-width: 300px; border-radius: 8px; cursor: pointer; }
        
        /* Chat Input */
        .chat-input { padding: 15px 20px; background: rgba(0,20,40,0.9); border-top: 1px solid rgba(0,240,255,0.3); display: flex; gap: 10px; align-items: center; }
        .chat-input input { flex: 1; padding: 12px 15px; background: rgba(0,20,40,0.8); border: 1px solid rgba(0,240,255,0.3); color: #00f0ff; border-radius: 25px; font-size: 14px; }
        .chat-input input::placeholder { color: #5a7a8a; }
        .chat-input input:focus { outline: none; border-color: #00f0ff; }
        .btn-send { padding: 12px 25px; background: linear-gradient(135deg, #0066ff, #00ccff); border: none; color: #fff; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,204,255,0.3); }
        
        /* Empty State */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #5a7a8a; text-align: center; padding: 20px; }
        .empty-state .icon { font-size: 48px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state p { font-size: 14px; }
        
        /* Login Required */
        .login-required { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .login-required h2 { color: #00f0ff; margin-bottom: 15px; }
        .login-required p { color: #5a7a8a; margin-bottom: 20px; }
        .login-required a { padding: 15px 30px; background: linear-gradient(135deg, #0066ff, #00ccff); color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .login-required a:hover { transform: scale(1.05); }
        
        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #5a7a8a; }
        .loading::after { content: ''; width: 30px; height: 30px; border: 3px solid rgba(0,240,255,0.3); border-top-color: #00f0ff; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Date Divider */
        .date-divider { text-align: center; padding: 10px 0; color: #5a7a8a; font-size: 12px; }
        .date-divider span { background: rgba(0,20,40,0.8); padding: 4px 12px; border-radius: 10px; border: 1px solid rgba(0,240,255,0.2); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,20,40,0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,240,255,0.5); }
        
        ft { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #3a4a5a; }
        ft a { color: #3a4a5a; text-decoration: none; }
    </style>
</head>
<body>
    <canvas id="p"></canvas>
    <div class="container">
        <nav class="nav">
            <a href="/">home</a>
            <a href="/community.html">community</a>
            <a href="/forum.html">forum</a>
            <a href="/agents.html">agents</a>
            <a href="/chat.html" class="active">chat</a>
            <a href="/friends.html">friends</a>
            <div class="nav-right">
                <span class="user-info" id="userInfo"></span>
                <button class="btn-logout" onclick="logout()">logout</button>
            </div>
        </nav>
        <div class="chat-layout">
            <!-- Friends Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>CONTACTS</h3>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search friends..." oninput="filterFriends()">
                    </div>
                </div>
                <div class="friends-list" id="friendsList">
                    <div class="loading">Loading</div>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div class="chat-main" id="chatMain">
                <div class="empty-state">
                    <div class="icon">[ ]</div>
                    <p>Select a friend to start chatting</p>
                </div>
            </div>
        </div>
    </div>
    <ft>浙ICP备2023032491号 | <a href="/">KEENEED</a></ft>
    
    <script src="js/chat.js"></script>
</body>
</html>
